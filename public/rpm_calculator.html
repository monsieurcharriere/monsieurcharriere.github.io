<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- EXACT CSS from monsieurcharriere.github.io -->
  <link rel="stylesheet" href="/css/style.css">

  <title>Calculatrice de RPM</title>
</head>

<body>
 <div class="bg-animation" id="bgAnimation"></div>

    <div class="container mx-auto px-4 py-12 max-w-md">
        
        
<div class="flex flex-col items-center mb-8">
<header class="site-header">
  <div class="wrapper">
    <nav>
      <a href="rpm_calculator.html"><strong>Calculatric de RPM</strong></a>
      &nbsp;|&nbsp;
      <a href="1rm_percentages.html">Pourcentages 1RM</a>
    </nav>
  </div>
</header>

<main class="page-content">
  <div class="wrapper">

    <h1>RPM Percentage Calculator</h1>

    <label for="rpmInput">RPM</label>
    <input type="number" id="rpmInput" placeholder="Enter RPM value">

    <button onclick="calculate()">Caalculer %</button>

    <div id="results"></div>

  </div>
</main>

<footer class="site-footer">
  <div class="wrapper">
    <p><a href="https://monsieurcharriere.github.io">Revenir au site</a></p>
  </div>
</footer>

<script>
function calculate() {
    const rpm = parseFloat(document.getElementById("rpmInput").value);
    const output = document.getElementById("results");

    if (isNaN(rpm)) {
        output.innerHTML = "<p>Veuillez entrer un nombre valide.</p>";
        return;
    }

    const percentages = [50, 60, 70, 80, 90, 100, 110, 120];

    let html = "<h3>Résultats</h3><ul>";
    percentages.forEach(p => {
        const value = rpm * (p / 100);
        html += `<li>${p}% = ${value.toFixed(2)}</li>`;
    });
    html += "</ul>";

    output.innerHTML = html;
}
</script>

</body>
</html>
