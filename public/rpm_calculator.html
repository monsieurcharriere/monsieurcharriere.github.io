<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>

/* -----------------------------------------------------------
   BACKGROUND ANIMATION (LIGHTER, OVERLAY ONLY)
----------------------------------------------------------- */

:root {
    --dot-color: rgba(255, 255, 255, 0.18);
}

.bg-animation {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: transparent; /* let theme background show */
}

.bg-animation span {
    position: absolute;
    display: block;
    border-radius: 50%;
    background: var(--dot-color);
    filter: blur(1px);
    animation: animate linear infinite;
    opacity: 0.6;
}

@keyframes animate {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0.6;
    }
    100% {
        transform: translateY(-1200px) scale(0.4);
        opacity: 0;
    }
}

/* -----------------------------------------------------------
   NAV + SPACING + INPUT + BUTTON FIXES
----------------------------------------------------------- */

/* Improved top navigation links */
nav a {
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255, 255, 255, 0.85) !important;
    text-decoration: none;
    padding: 4px 6px;
    transition: color 0.25s ease, text-shadow 0.25s ease;
}

nav a strong {
    color: #ffffff !important; /* active page */
}

nav a:hover {
    color: #ffffff !important;
    text-shadow: 0 0 6px rgba(255, 255, 255, 0.45);
}
.site-header {
    margin-bottom: 1.5rem;
}

nav {
    padding-bottom: 0.5rem;
}
  /* Make top nav links fit on one line on mobile */
nav {
    display: flex;
    justify-content: center;
    gap: 0.75rem; /* space between links */
    flex-wrap: nowrap; /* prevent wrapping */
    white-space: nowrap; /* force single line */
}

/* Style links to match your site's aesthetic */
nav a {
    font-size: 1.05rem; /* slightly smaller so they fit */
    font-weight: 600;
    letter-spacing: 0.4px;
    color: rgba(255, 255, 255, 0.85) !important;
    text-decoration: none;
    padding: 4px 6px;
    transition: color 0.25s ease, text-shadow 0.25s ease;
}

nav a strong {
    color: #ffffff !important;
}

nav a:hover {
    color: #ffffff !important;
    text-shadow: 0 0 6px rgba(255, 255, 255, 0.45);
}

/* Make the separator smaller and consistent */
nav .sep {
    opacity: 0.6;
    padding: 0 4px;
}

input[type="number"],
input[type="text"],
input,
textarea {
    color: #000 !important;
}

input::placeholder {
    color: #555 !important;
}

button {
    background-color: #e5e7eb !important;
    color: #000 !important;
    border: 1px solid #000 !important;
    padding: 8px 14px !important;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #d1d5db !important;
}
/* Make top nav links fit on one line on mobile */
nav {
    display: flex;
    justify-content: center;
    gap: 0.75rem; /* space between links */
    flex-wrap: nowrap; /* prevent wrapping */
    white-space: nowrap; /* force single line */
}

/* Style links to match your site's aesthetic */
nav a {
    font-size: 1.05rem; /* slightly smaller so they fit */
    font-weight: 600;
    letter-spacing: 0.4px;
    color: rgba(255, 255, 255, 0.85) !important;
    text-decoration: none;
    padding: 4px 6px;
    transition: color 0.25s ease, text-shadow 0.25s ease;
}

nav a strong {
    color: #ffffff !important;
}

nav a:hover {
    color: #ffffff !important;
    text-shadow: 0 0 6px rgba(255, 255, 255, 0.45);
}

/* Make the separator smaller and consistent */
nav .sep {
    opacity: 0.6;
    padding: 0 4px;
}
  /* Force the input section to behave like a full-width mobile block */
.wrapper {
    width: 100%;
}

/* Make label, input, and button stack cleanly */
.wrapper label {
    display: block;
    width: 100%;
    margin-bottom: 0.5rem;
}

/* Full-width input */
.wrapper input[type="number"],
.wrapper input[type="text"] {
    width: 100% !important;
    box-sizing: border-box;
    margin-bottom: 1rem;
}

/* Full-width button */
.wrapper button {
    width: 100% !important;
    box-sizing: border-box;
    margin-top: 0.5rem;
}
</style>

<title>Calculatrice de RPM</title>
</head>

<body>

<div class="bg-animation" id="bgAnimation"></div>

<div class="container mx-auto px-4 py-12 max-w-md">

<div class="flex flex-col items-center mb-8">
<header class="site-header">
  <div class="wrapper">
    <nav>
      <a href="rpm_calculator.html"><strong>Calculatrice RPM</strong></a>
      &nbsp;|&nbsp;
      <a href="1rm_percentages.html">Pourcentages 1RM</a>
    </nav>
  </div>
</header>

<main class="page-content">
  <div class="wrapper">

    <h1>Calculatrice de RPM</h1>

    <!--label for="rpmInput">RPM</label-->
    <input type="number" id="rpmInput" placeholder="Entrer RPM moyen">

    <button onclick="calculate()">Calculer %</button>

    <div id="results"></div>

  </div>
</main>

<footer class="site-footer">
  <div class="wrapper">
    <p><a href="https://monsieurcharriere.github.io">Revenir au site</a></p>
  </div>
</footer>

<script>

/* -----------------------------------------------------------
   PARTICLE GENERATOR
----------------------------------------------------------- */

const bg = document.getElementById("bgAnimation");

function spawnParticle() {
    const particle = document.createElement("span");

    const size = Math.random() * 14 + 6;
    particle.style.width = size + "px";
    particle.style.height = size + "px";

    particle.style.left = Math.random() * window.innerWidth + "px";
    particle.style.bottom = "-60px";

    particle.style.animationDuration = (Math.random() * 12 + 8) + "s";
    particle.style.animationDelay = Math.random() * 4 + "s";

    bg.appendChild(particle);

    setTimeout(() => particle.remove(), 20000);
}

for (let i = 0; i < 50; i++) {
    spawnParticle();
}

setInterval(spawnParticle, 450);

/* -----------------------------------------------------------
   CALCULATOR LOGIC
----------------------------------------------------------- */

function calculate() {
    const rpm = parseFloat(document.getElementById("rpmInput").value);
    const output = document.getElementById("results");

    if (isNaN(rpm)) {
        output.innerHTML = "<p>Veuillez entrer un nombre valide.</p>";
        return;
    }

    const percentages = [50, 60, 70, 80, 90, 100, 110, 120];

    let html = "<h3>Résultats</h3><ul>";
    percentages.forEach(p => {
        const value = rpm * (p / 100);
        html += `<li>${p}% = ${value.toFixed(2)}</li>`;
    });
    html += "</ul>";

    output.innerHTML = html;
}

</script>

</body>
</html>
