<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
   <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <style>
  input[type="number"],
  input[type="text"],
  input,
  textarea {
      color: #000 !important;
  }

  input::placeholder {
      color: #555 !important;
  }
button {
    border: 1px solid #000;
    background-color: #fff;
    color: #000;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #f2f2f2;
}
</style>



  <title>Calculatrice de RPM</title>
</head>

<body>
 <div class="bg-animation" id="bgAnimation"></div>

    <div class="container mx-auto px-4 py-12 max-w-md">
        
        
<div class="flex flex-col items-center mb-8">
<header class="site-header">
  <div class="wrapper">
    <nav>
      <a href="rpm_calculator.html"><strong>Calculatrice de RPM</strong></a>
      &nbsp;|&nbsp;
      <a href="1rm_percentages.html">Pourcentages 1RM</a>
    </nav>
  </div>
</header>

<main class="page-content">
  <div class="wrapper">

    <h1>Calculatrice de RPM</h1>

    <label for="rpmInput">RPM</label>
    <input type="number" id="rpmInput" placeholder="Enter RPM value">

    <button onclick="calculate()">Calculer %</button>

    <div id="results"></div>

  </div>
</main>

<footer class="site-footer">
  <div class="wrapper">
    <p><a href="https://monsieurcharriere.github.io">Revenir au site</a></p>
  </div>
</footer>

<script>
function calculate() {
    const rpm = parseFloat(document.getElementById("rpmInput").value);
    const output = document.getElementById("results");

    if (isNaN(rpm)) {
        output.innerHTML = "<p>Veuillez entrer un nombre valide.</p>";
        return;
    }

    const percentages = [50, 60, 70, 80, 90, 100, 110, 120];

    let html = "<h3>Résultats</h3><ul>";
    percentages.forEach(p => {
        const value = rpm * (p / 100);
        html += `<li>${p}% = ${value.toFixed(2)}</li>`;
    });
    html += "</ul>";

    output.innerHTML = html;
}
</script>

</body>
</html>
