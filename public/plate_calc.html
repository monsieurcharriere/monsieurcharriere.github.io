<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

<style>

/* -----------------------------------------------------------
   GLOBAL BACKGROUND (MATCHES YOUR OTHER CALCULATORS)
----------------------------------------------------------- */

:root {
    --bg-color: #1a1a2e;
    --dot-color: rgba(255, 255, 255, 0.22);
}

html, body {
    background-color: var(--bg-color) !important;
    font-family: 'Inter', sans-serif;
}

/* -----------------------------------------------------------
   PARTICLE BACKGROUND
----------------------------------------------------------- */

.bg-animation {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: transparent;
}

.bg-animation span {
    position: absolute;
    display: block;
    border-radius: 50%;
    background: var(--dot-color);
    filter: blur(8px);
    opacity: 0.18;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 0.18; }
    100% { transform: translateY(-2000px) scale(0.7); opacity: 0; }
}

/* -----------------------------------------------------------
   FORM STYLING (MATCHES OTHER TOOLS)
----------------------------------------------------------- */

input, select {
    color: #000 !important;
}

input::placeholder {
    color: #555 !important;
}

button {
    background-color: #e5e7eb !important;
    color: #000 !important;
    border: 1px solid #000 !important;
    padding: 8px 14px !important;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #d1d5db !important;
}

.wrapper {
    width: 100%;
}

.wrapper label {
    display: block;
    width: 100%;
    margin-bottom: 0.5rem;
}

.wrapper input,
.wrapper select {
    width: 100% !important;
    box-sizing: border-box;
    margin-bottom: 1rem;
}

.wrapper button {
    width: 100% !important;
    margin-top: 0.5rem;
}

/* Inline label + dropdown */
.inline-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.25rem;
}

.inline-label select {
    width: auto !important;
    margin: 0 !important;
    padding: 4px 6px;
}

/* Plate checkboxes */
.plate-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1rem;
    margin-bottom: 1rem;
}

.plate-item {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    color: rgba(255, 255, 255, 0.85);
    font-size: 0.9rem;
}

/* Return link */
a.return-link {
    display: block;
    text-align: center;
    margin-top: 2rem;
    color: rgba(255, 255, 255, 0.85);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.25s ease, text-shadow 0.25s ease;
}

a.return-link:hover {
    color: #ffffff;
    text-shadow: 0 0 6px rgba(255, 255, 255, 0.45);
}

</style>

<title>Calculatrice de chargement de barre</title>
</head>

<body>

<div class="bg-animation" id="bgAnimation"></div>

<div class="container mx-auto px-4 py-12 max-w-md">
  <div class="wrapper">

    <h1 class="text-2xl font-bold mb-2 text-white">Calculatrice de chargement de barre</h1>

    <p class="text-white" style="opacity:0.85; font-size:0.9rem; margin-top:-0.5rem; margin-bottom:1rem;">
      Entrez le poids total souhaité, le poids de la barre et les disques disponibles. L’outil calcule la
      répartition des disques à charger de chaque côté de la barre.
    </p>

    <!-- UNIT -->
    <div class="inline-label">
        <label class="text-white">Unité</label>
        <select id="unitSelect">
          <option value="kg">kg</option>
          <option value="lbs">lbs</option>
        </select>
    </div>

    <!-- TOTAL WEIGHT -->
    <label class="text-white">Poids total souhaité (barre incluse)</label>
    <input type="number" id="totalWeight" placeholder="Ex. 100">

    <!-- BAR WEIGHT -->
    <label class="text-white">Poids de la barre</label>
    <input type="number" id="barWeight" placeholder="Ex. 20">

    <!-- PLATES AVAILABLE -->
    <label class="text-white">Disques disponibles (par paire)</label>
    <div id="platesContainer" class="plate-list">
      <!-- Filled dynamically based on unit -->
    </div>

    <button onclick="calculatePlates()">Calculer le chargement</button>

    <div id="results" class="mt-4 text-white"></div>

    <a href="https://monsieurcharriere.github.io" class="return-link">Revenir au site</a>

  </div>
</div>

<script>

/* -----------------------------------------------------------
   PARTICLE SYSTEM
----------------------------------------------------------- */

const bg = document.getElementById("bgAnimation");

function spawnParticle(startAnywhere = false) {
    const particle = document.createElement("span");

    const size = Math.random() * 80 + 40;
    particle.style.width = size + "px";
    particle.style.height = size + "px";

    particle.style.left = Math.random() * window.innerWidth + "px";

    if (startAnywhere) {
        particle.style.bottom = (Math.random() * window.innerHeight - 120) + "px";
    } else {
        particle.style.bottom = "-120px";
    }

    particle.style.animationDuration = (Math.random() * 27 + 28) + "s";
    particle.style.animationDelay = (Math.random() * 10) + "s";

    bg.appendChild(particle);

    setTimeout(() => particle.remove(), 60000);
}

for (let i = 0; i < 20; i++) spawnParticle(true);
setInterval(() => spawnParticle(false), 2000);

/* -----------------------------------------------------------
   PLATE SETS
----------------------------------------------------------- */

const plateSets = {
    kg: [25, 20, 15, 10, 5, 2.5, 1.25],
    lbs: [45, 35, 25, 10, 5, 2.5]
};

function renderPlateCheckboxes() {
    const unit = document.getElementById("unitSelect").value;
    const container = document.getElementById("platesContainer");
    container.innerHTML = "";

    plateSets[unit].forEach(value => {
        const div = document.createElement("div");
        div.className = "plate-item";

        const input = document.createElement("input");
        input.type = "checkbox";
        input.checked = true;
        input.value = value;
        input.id = `plate-${unit}-${value}`;

        const label = document.createElement("label");
        label.setAttribute("for", input.id);
        label.textContent = value + " " + unit;

        div.appendChild(input);
        div.appendChild(label);
        container.appendChild(div);
    });
}

/* -----------------------------------------------------------
   MAIN CALCULATION
----------------------------------------------------------- */

function calculatePlates() {
    const unit = document.getElementById("unitSelect").value;
    const total = parseFloat(document.getElementById("totalWeight").value);
    const bar = parseFloat(document.getElementById("barWeight").value);
    const results = document.getElementById("results");

    if (isNaN(total) || isNaN(bar) || total <= 0 || bar <= 0) {
        results.innerHTML = "<p>Veuillez entrer un poids total et un poids de barre valides.</p>";
        return;
    }

    if (total <= bar) {
        results.innerHTML = "<p>Le poids total doit être supérieur au poids de la barre.</p>";
        return;
    }

    const perSide = (total - bar) / 2;

    // Collect available plates
    const checkboxes = document.querySelectorAll("#platesContainer input[type='checkbox']:checked");
    if (checkboxes.length === 0) {
        results.innerHTML = "<p>Veuillez sélectionner au moins un type de disque.</p>";
        return;
    }

    let plates = [];
    checkboxes.forEach(cb => plates.push(parseFloat(cb.value)));
    plates.sort((a, b) => b - a); // largest first

    let remaining = perSide;
    const used = {};

    plates.forEach(p => {
        let count = 0;
        while (remaining >= p - 1e-6) { // small epsilon
            remaining -= p;
            count++;
        }
        if (count > 0) {
            used[p] = count;
        }
    });

    if (Math.abs(remaining) > 0.01) {
        results.innerHTML = `
          <p>Impossible de composer exactement ${perSide.toFixed(2)} ${unit} par côté avec les disques sélectionnés.</p>
        `;
        return;
    }

    let listHtml = "<ul>";
    Object.keys(used).forEach(p => {
        listHtml += `<li>${used[p]} × ${p} ${unit} par côté</li>`;
    });
    listHtml += "</ul>";

    results.innerHTML = `
      <h3 class="text-xl font-semibold mb-2">Résultat</h3>
      <p>Poids total : <strong>${total.toFixed(2)} ${unit}</strong></p>
      <p>Poids de la barre : <strong>${bar.toFixed(2)} ${unit}</strong></p>
      <p>À charger par côté : <strong>${perSide.toFixed(2)} ${unit}</strong></p>
      <h4 class="mt-3 mb-1 font-semibold">Disques par côté :</h4>
      ${listHtml}
    `;
}

/* -----------------------------------------------------------
   INIT
----------------------------------------------------------- */

document.getElementById("unitSelect").addEventListener("change", renderPlateCheckboxes);
renderPlateCheckboxes();

</script>

</body>
</html>
