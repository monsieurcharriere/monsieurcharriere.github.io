<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

<style>

/* -----------------------------------------------------------
   MATCHED BACKGROUND ANIMATION (IDENTICAL TO OTHER PAGES)
----------------------------------------------------------- */

:root {
    --dot-color: rgba(255, 255, 255, 0.22);
}

body {
    background-color: #0f0f0f !important;
    font-family: 'Inter', sans-serif;
}

.bg-animation {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
}

.bg-animation span {
    position: absolute;
    display: block;
    border-radius: 50%;
    background: var(--dot-color);
    filter: blur(8px);
    opacity: 0.18;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 0.18; }
    100% { transform: translateY(-2000px) scale(0.7); opacity: 0; }
}

/* -----------------------------------------------------------
   INPUT + BUTTON STYLING (MATCHES OTHER CALCULATORS)
----------------------------------------------------------- */

input, select {
    color: #000 !important;
}

input::placeholder {
    color: #555 !important;
}

button {
    background-color: #e5e7eb !important;
    color: #000 !important;
    border: 1px solid #000 !important;
    padding: 8px 14px !important;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #d1d5db !important;
}

.wrapper {
    width: 100%;
}

.wrapper input, .wrapper select {
    width: 100%;
    margin-bottom: 1rem;
    box-sizing: border-box;
}

.wrapper button {
    width: 100%;
    margin-top: 0.5rem;
}

</style>

<title>Calculateur Mifflin–St Jeor</title>
</head>

<body>

<div class="bg-animation" id="bgAnimation"></div>

<div class="container mx-auto px-4 py-12 max-w-md">
  <div class="wrapper">

    <h1 class="text-2xl font-bold mb-2 text-white">Calculateur Mifflin–St Jeor</h1>

    <p class="text-white" style="opacity:0.85; font-size:0.9rem; margin-top:-0.5rem; margin-bottom:1rem;">
      Calcule votre métabolisme de base (BMR) et vos besoins caloriques quotidiens selon la formule de Mifflin–St Jeor.
    </p>

    <!-- SEX -->
    <label class="text-white">Sexe assigné à la naissance</label>
    <select id="sexInput">
      <option value="male">Homme</option>
      <option value="female">Femme</option>
    </select>

    <!-- WEIGHT -->
    <label class="text-white">Poids</label>
    <input type="number" id="weightInput" placeholder="Entrer votre poids">
    <select id="weightUnit">
      <option value="kg">kg</option>
      <option value="lbs">lbs</option>
    </select>

    <!-- HEIGHT UNIT SELECTOR -->
    <label class="text-white">Taille</label>
    <select id="heightMode" onchange="toggleHeightMode()">
      <option value="cm">Centimètres</option>
      <option value="ftin">Pieds + pouces</option>
    </select>

    <!-- HEIGHT IN CM -->
    <input type="number" id="heightCm" placeholder="Taille en centimètres">

    <!-- HEIGHT IN FEET + INCHES -->
    <div id="heightFeetInches" style="display:none;">
      <input type="number" id="heightFeet" placeholder="Pieds">
      <input type="number" id="heightInches" placeholder="Pouces">
    </div>

    <!-- AGE -->
    <label class="text-white">Âge</label>
    <input type="number" id="ageInput" placeholder="Entrer votre âge">

    <!-- CALC TYPE -->
    <label class="text-white">Type de calcul</label>
    <select id="calcType" onchange="toggleActivity()">
      <option value="bmr">BMR seulement</option>
      <option value="tdee">BMR + niveau d’activité</option>
    </select>

    <!-- ACTIVITY LEVEL -->
    <div id="activityWrapper" style="display:none;">
      <label class="text-white">Niveau d’activité</label>
      <select id="activityInput">
        <option value="1.2">Sédentaire (×1.2)</option>
        <option value="1.375">Légèrement actif (×1.375)</option>
        <option value="1.55">Modérément actif (×1.55)</option>
        <option value="1.725">Très actif (×1.725)</option>
      </select>
    </div>

    <button onclick="calculate()">Calculer</button>

    <div id="results" class="mt-4 text-white"></div>

  </div>
</div>

<script>

/* -----------------------------------------------------------
   BACKGROUND PARTICLES (IDENTICAL TO OTHER PAGES)
----------------------------------------------------------- */

const bg = document.getElementById("bgAnimation");

function spawnParticle(startAnywhere = false) {
    const p = document.createElement("span");
    const size = Math.random() * 80 + 40;
    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = Math.random() * window.innerWidth + "px";

    if (startAnywhere) {
        p.style.bottom = (Math.random() * window.innerHeight - 120) + "px";
    } else {
        p.style.bottom = "-120px";
    }

    p.style.animationDuration = (Math.random() * 27 + 28) + "s";
    p.style.animationDelay = (Math.random() * 10) + "s";

    bg.appendChild(p);
    setTimeout(() => p.remove(), 60000);
}

for (let i = 0; i < 20; i++) spawnParticle(true);
setInterval(() => spawnParticle(false), 2000);

/* -----------------------------------------------------------
   HEIGHT MODE SWITCHING
----------------------------------------------------------- */

function toggleHeightMode() {
    const mode = document.getElementById("heightMode").value;
    document.getElementById("heightCm").style.display = mode === "cm" ? "block" : "none";
    document.getElementById("heightFeetInches").style.display = mode === "ftin" ? "block" : "none";
}

/* -----------------------------------------------------------
   ACTIVITY DROPDOWN VISIBILITY
----------------------------------------------------------- */

function toggleActivity() {
    const type = document.getElementById("calcType").value;
    document.getElementById("activityWrapper").style.display =
        type === "tdee" ? "block" : "none";
}

/* -----------------------------------------------------------
   CALCULATION LOGIC
----------------------------------------------------------- */

function calculate() {
    const sex = document.getElementById("sexInput").value;
    const weight = parseFloat(document.getElementById("weightInput").value);
    const weightUnit = document.getElementById("weightUnit").value;
    const heightMode = document.getElementById("heightMode").value;
    const age = parseFloat(document.getElementById("ageInput").value);
    const calcType = document.getElementById("calcType").value;

    let heightCm;

    if (heightMode === "cm") {
        heightCm = parseFloat(document.getElementById("heightCm").value);
    } else {
        const ft = parseFloat(document.getElementById("heightFeet").value);
        const inch = parseFloat(document.getElementById("heightInches").value);
        heightCm = ft * 30.48 + inch * 2.54;
    }

    if (isNaN(weight) || isNaN(heightCm) || isNaN(age)) {
        document.getElementById("results").innerHTML =
            "<p>Veuillez remplir tous les champs correctement.</p>";
        return;
    }

    // Convert lbs → kg
    const weightKg = weightUnit === "lbs" ? weight * 0.453592 : weight;

    // Mifflin–St Jeor
    let bmr = 10 * weightKg + 6.25 * heightCm - 5 * age;
    bmr += sex === "male" ? 5 : -161;

    let resultHtml = `<h3 class="text-xl font-semibold">BMR : ${bmr.toFixed(0)} calories/jour</h3>`;

    if (calcType === "tdee") {
        const activity = parseFloat(document.getElementById("activityInput").value);
        const tdee = bmr * activity;
        resultHtml += `<p class="mt-2">Besoins caloriques quotidiens : <strong>${tdee.toFixed(0)} calories/jour</strong></p>`;
    }

    document.getElementById("results").innerHTML = resultHtml;
}

</script>

</body>
</html>
