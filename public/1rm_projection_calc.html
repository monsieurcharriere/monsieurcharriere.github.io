<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">

<style>

/* -----------------------------------------------------------
   SOFT, FEATHERED, SUBTLE BACKGROUND (BRIGHTER + START ON PAGE)
----------------------------------------------------------- */

:root {
    --dot-color: rgba(255, 255, 255, 0.22);
}

.bg-animation {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: transparent;
}

.bg-animation span {
    position: absolute;
    display: block;
    border-radius: 50%;
    background: var(--dot-color);
    filter: blur(8px);
    opacity: 0.18;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0.18;
    }
    100% {
        transform: translateY(-2000px) scale(0.7);
        opacity: 0;
    }
}

/* -----------------------------------------------------------
   NAV + SPACING + INPUT + BUTTON FIXES
----------------------------------------------------------- */

nav {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    flex-wrap: nowrap;
    white-space: nowrap;
    padding-bottom: 0.5rem;
}

nav a {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: rgba(255, 255, 255, 0.85) !important;
    text-decoration: none;
    padding: 4px 6px;
    transition: color 0.25s ease, text-shadow 0.25s ease;
}

nav a strong {
    color: #ffffff !important;
}

nav a:hover {
    color: #ffffff !important;
    text-shadow: 0 0 6px rgba(255, 255, 255, 0.45);
}

nav .sep {
    opacity: 0.6;
    padding: 0 4px;
}

.site-header {
    margin-bottom: 1.5rem;
}

input[type="number"],
input[type="text"],
input,
textarea {
    color: #000 !important;
}

input::placeholder {
    color: #555 !important;
}

button {
    background-color: #e5e7eb !important;
    color: #000 !important;
    border: 1px solid #000 !important;
    padding: 8px 14px !important;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #d1d5db !important;
}

/* Full-width mobile layout */
.wrapper {
    width: 100%;
}

.wrapper label {
    display: block;
    width: 100%;
    margin-bottom: 0.5rem;
}

.wrapper input[type="number"],
.wrapper input[type="text"] {
    width: 100% !important;
    box-sizing: border-box;
    margin-bottom: 1rem;
}

.wrapper button {
    width: 100% !important;
    box-sizing: border-box;
    margin-top: 0.5rem;
}

</style>

<title>Calculatrice de 1RM estimée</title>

</head>

<body>

<div class="bg-animation" id="bgAnimation"></div>

<div class="container mx-auto px-4 py-12 max-w-md">

<div class="flex flex-col items-center mb-8">
<header class="site-header">
  <div class="wrapper">
    <nav>
      <a href="rpm_calculator.html">% RPM</a>
      <span class="sep">|</span>
      <a href="1rm_percentages.html">% 1RM</a>
      <span class="sep">|</span>
      <a href="1rm_projection_calc.html">1RM estimé</a>
    </nav>
  </div>
</header>

<main class="page-content">
  <div class="wrapper">

    <h1>Estimateur de 1RM</h1>
    <br>
<p style="opacity:0.85; font-size:0.9rem; margin-top:-0.5rem; margin-bottom:1rem;">
  Basé sur la formule de Brzycki, généralement considérée comme la plus précise pour des séries de 1 à 6 répétitions.
</p>
<label for="weightInput">Poids (lbs)</label>
<input type="number" id="weightInput" placeholder="Entrer le poids soulevé en livres">


    <label for="repsInput">Répétitions</label>
    <input type="number" id="repsInput" placeholder="Entrer le nombre de répétitions">

    <button onclick="calculate()">Calculer 1RM estimé</button>

    <div id="results"></div>

  </div>
</main>

<footer class="site-footer">
  <div class="wrapper">
    <p><a href="https://monsieurcharriere.github.io">Revenir au site</a></p>
  </div>
</footer>

<script>

/* -----------------------------------------------------------
   SOFT, SLOW, FEATHERED PARTICLES (BRIGHTER + START ON PAGE)
----------------------------------------------------------- */

const bg = document.getElementById("bgAnimation");

function spawnParticle(startAnywhere = false) {
    const particle = document.createElement("span");

    const size = Math.random() * 80 + 40;
    particle.style.width = size + "px";
    particle.style.height = size + "px";

    particle.style.left = Math.random() * window.innerWidth + "px";

    if (startAnywhere) {
        const startY = Math.random() * window.innerHeight - 120;
        particle.style.bottom = startY + "px";
    } else {
        particle.style.bottom = "-120px";
    }

    particle.style.animationDuration = (Math.random() * 27 + 28) + "s";
    particle.style.animationDelay = (Math.random() * 10) + "s";

    bg.appendChild(particle);

    setTimeout(() => particle.remove(), 60000);
}

for (let i = 0; i < 20; i++) {
    spawnParticle(true);
}

setInterval(() => spawnParticle(false), 2000);

/* -----------------------------------------------------------
   BRZYCKI 1RM CALCULATOR LOGIC
----------------------------------------------------------- */

function calculate() {
    const weight = parseFloat(document.getElementById("weightInput").value);
    const reps = parseFloat(document.getElementById("repsInput").value);
    const output = document.getElementById("results");

    if (isNaN(weight) || isNaN(reps) || reps <= 0 || reps >= 37) {
        output.innerHTML = "<p>Veuillez entrer des valeurs valides.</p>";
        return;
    }

    const oneRM = weight * 36 / (37 - reps);

    output.innerHTML = `
        <h3>Résultat</h3>
        <p>Votre 1RM estimé est : <strong>${oneRM.toFixed(2)} lbs</strong></p>
    `;
}

</script>

</body>
</html>
