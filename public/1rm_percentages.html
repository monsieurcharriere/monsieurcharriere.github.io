<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- EXACT CSS from monsieurcharriere.github.io -->
  <link rel="stylesheet" href="/css/style.css">"

  <title>1RM Percentages</title>
</head>

<body>

<header class="site-header">
  <div class="wrapper">
    <nav>
      <a href="rpm_calculator.html">RPM Calculator</a>
      &nbsp;|&nbsp;
      <a href="1rm_percentages.html"><strong>1RM Percentages</strong></a>
    </nav>
  </div>
</header>

<main class="page-content">
  <div class="wrapper">

    <h1>1RM Percentages</h1>

    <label for="rmInput">Enter 1RM</label>
    <input type="number" id="rmInput" placeholder="Enter 1RM value">

    <button onclick="calculate()">Calculate Percentages</button>

    <div id="results"></div>

  </div>
</main>

<footer class="site-footer">
  <div class="wrapper">
    <p><a href="https://monsieurcharriere.github.io">Return to site</a></p>
  </div>
</footer>

<script>
function calculate() {
    const rm = parseFloat(document.getElementById("rmInput").value);
    const output = document.getElementById("results");

    if (isNaN(rm)) {
        output.innerHTML = "<p>Please enter a valid number.</p>";
        return;
    }

    const percentages = [50, 60, 70, 72.5, 75, 80, 82.5, 85, 87.5, 90, 92.5, 95];

    let html = "<h3>Results</h3><ul>";
    percentages.forEach(p => {
        const value = rm * (p / 100);
        html += `<li>${p}% = ${value.toFixed(2)}</li>`;
    });
    html += "</ul>";

    output.innerHTML = html;
}
</script>

</body>
</html>
