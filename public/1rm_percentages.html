<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>

/* -----------------------------------------------------------
   SOFT, FEATHERED, SUBTLE BACKGROUND (BRIGHTER + START ON PAGE)
----------------------------------------------------------- */

:root {
    --dot-color: rgba(255, 255, 255, 0.22); /* brighter but still soft */
}

.bg-animation {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: transparent;
}

.bg-animation span {
    position: absolute;
    display: block;
    border-radius: 50%;
    background: var(--dot-color);
    filter: blur(8px);
    opacity: 0.18; /* slightly brighter */
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0.18;
    }
    100% {
        transform: translateY(-2000px) scale(0.7);
        opacity: 0;
    }
}

/* -----------------------------------------------------------
   NAV + SPACING + INPUT + BUTTON FIXES
----------------------------------------------------------- */

nav {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    flex-wrap: nowrap;
    white-space: nowrap;
    padding-bottom: 0.5rem;
}

nav a {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: rgba(255, 255, 255, 0.85) !important;
    text-decoration: none;
    padding: 4px 6px;
    transition: color 0.25s ease, text-shadow 0.25s ease;
}

nav a strong {
    color: #ffffff !important;
}

nav a:hover {
    color: #ffffff !important;
    text-shadow: 0 0 6px rgba(255, 255, 255, 0.45);
}

nav .sep {
    opacity: 0.6;
    padding: 0 4px;
}

.site-header {
    margin-bottom: 1.5rem;
}

input[type="number"],
input[type="text"],
input,
textarea {
    color: #000 !important;
}

input::placeholder {
    color: #555 !important;
}

button {
    background-color: #e5e7eb !important;
    color: #000 !important;
    border: 1px solid #000 !important;
    padding: 8px 14px !important;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #d1d5db !important;
}

/* Full-width mobile layout */
.wrapper {
    width: 100%;
}

.wrapper label {
    display: block;
    width: 100%;
    margin-bottom: 0.5rem;
}

.wrapper input[type="number"],
.wrapper input[type="text"] {
    width: 100% !important;
    box-sizing: border-box;
    margin-bottom: 1rem;
}

.wrapper button {
    width: 100% !important;
    box-sizing: border-box;
    margin-top: 0.5rem;
}

</style>

<title>Pourcentages 1RM</title>
</head>

<body>

<div class="bg-animation" id="bgAnimation"></div>

<div class="container mx-auto px-4 py-12 max-w-md">

<div class="flex flex-col items-center mb-8">
<header class="site-header">
  <div class="wrapper">
    <nav>
      <a href="rpm_calculator.html">% RPM</a>
      <span class="sep">|</span>
      <a href="1rm_percentages.html">% 1RM</a>
      <span class="sep">|</span>
      <a href="1rm_projection_calc.html">1RM estimé</a>
    </nav>
  </div>
</header>

<main class="page-content">
  <div class="wrapper">

    <h1>Pourcentages 1RM</h1>

    <input type="number" id="rmInput" placeholder="Entrer votre 1RM">

    <button onclick="calculate()">Calculer % 1RM</button>

    <div id="results"></div>

  </div>
</main>

<footer class="site-footer">
  <div class="wrapper">
    <p><a href="https://monsieurcharriere.github.io">Revenir au site</a></p>
  </div>
</footer>

<script>

/* -----------------------------------------------------------
   SOFT, SLOW, FEATHERED PARTICLES
   INITIAL POPULATION ANYWHERE + NEW ONES FROM BOTTOM ONLY
----------------------------------------------------------- */

const bg = document.getElementById("bgAnimation");

function spawnParticle(startAnywhere = false) {
    const particle = document.createElement("span");

    /* Large particles: 40–120px */
    const size = Math.random() * 80 + 40;
    particle.style.width = size + "px";
    particle.style.height = size + "px";

    /* Random horizontal position */
    particle.style.left = Math.random() * window.innerWidth + "px";

    /* NEW LOGIC:
       - If startAnywhere = true → place particle anywhere on screen
       - Otherwise → spawn from bottom only
    */
    if (startAnywhere) {
        const startY = Math.random() * window.innerHeight - 120;
        particle.style.bottom = startY + "px";
    } else {
        particle.style.bottom = "-120px"; // bottom only
    }

    /* Very slow animation: 28–55 seconds */
    particle.style.animationDuration = (Math.random() * 27 + 28) + "s";

    /* Random delay */
    particle.style.animationDelay = (Math.random() * 10) + "s";

    bg.appendChild(particle);

    /* Remove after animation completes */
    setTimeout(() => particle.remove(), 60000);
}

/* INITIAL POPULATION: fill screen with particles */
for (let i = 0; i < 20; i++) {
    spawnParticle(true); // start anywhere
}

/* NEW PARTICLES: only from bottom */
setInterval(() => spawnParticle(false), 2000);


/* -----------------------------------------------------------
   CALCULATOR LOGIC
----------------------------------------------------------- */

function calculate() {
    const rm = parseFloat(document.getElementById("rmInput").value);
    const output = document.getElementById("results");

    if (isNaN(rm)) {
        output.innerHTML = "<p>Veuillez entrer un nombre valide.</p>";
        return;
    }

    const percentages = [50, 60, 70, 72.5, 75, 80, 82.5, 85, 87.5, 90, 92.5, 95];

    let html = "<h3>Résultats</h3><ul>";
    percentages.forEach(p => {
        const value = rm * (p / 100);
        html += `<li>${p}% = ${value.toFixed(2)}</li>`;
    });
    html += "</ul>";

    output.innerHTML = html;
}

</script>

</body>
</html>
