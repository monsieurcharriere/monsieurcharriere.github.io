<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

   <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <style>
    /* Background animation container */
.bg-animation {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
    background: #0f0f0f; /* fallback */
}

/* Animated floating dots */
.bg-animation span {
    position: absolute;
    display: block;
    width: 20px;
    height: 20px;
    background: rgba(255, 255, 255, 0.08);
    animation: move 10s linear infinite;
    border-radius: 50%;
}

/* Keyframes for movement */
@keyframes move {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0.4;
    }
    100% {
        transform: translateY(-1000px) scale(0.5);
        opacity: 0;
    }
}

    /* Make the top nav links larger and more obviously clickable */
nav a {
    font-size: 1.25rem;       /* bigger text */
    font-weight: 600;         /* semi-bold */
    color: #2563eb !important; /* Tailwind blue-600 */
}

nav a:hover {
    text-decoration: underline;
}

/* Add a paragraph break worth of space below the nav */
.site-header {
    margin-bottom: 1.5rem; /* ~24px, equivalent to a paragraph break */
}

/* Optional: add a tiny bit more breathing room inside the nav */
nav {
    padding-bottom: 0.5rem;
}

  input[type="number"],
  input[type="text"],
  input,
  textarea {
      color: #000 !important;
  }

  input::placeholder {
      color: #555 !important;
  }
button {
    background-color: #e5e7eb !important; /* light grey, visible on all backgrounds */
    color: #000 !important;
    border: 1px solid #000 !important;
    padding: 8px 14px !important;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #d1d5db !important; /* slightly darker hover */
}


</style>



  <title>Pourcentages 1RM</title>
</head>

<body>
 <div class="bg-animation" id="bgAnimation"></div>

    <div class="container mx-auto px-4 py-12 max-w-md">
        
        
<div class="flex flex-col items-center mb-8">
<header class="site-header">
  <div class="wrapper">
    <nav>
      <a href="rpm_calculator.html">Calculatrice RPM</a>
      &nbsp;|&nbsp;
      <a href="1rm_percentages.html"><strong>Pourcentages 1RM</strong></a>
    </nav>
  </div>
</header>

<main class="page-content">
  <div class="wrapper">

    <h1>Pourcentages 1RM</h1>

    <label for="rmInput">1RM</label>
    <input type="number" id="rmInput" placeholder="Inscrire votre 1RM">

    <button onclick="calculate()">Calculer %</button>

    <div id="results"></div>

  </div>
</main>

<footer class="site-footer">
  <div class="wrapper">
    <p><a href="https://monsieurcharriere.github.io">Revenir au site</a></p>
  </div>
</footer>

<script>
function calculate() {
    const rm = parseFloat(document.getElementById("rmInput").value);
    const output = document.getElementById("results");

    if (isNaN(rm)) {
        output.innerHTML = "<p>Veuillez entrer un nombre valide.</p>";
        return;
    }

    const percentages = [50, 60, 70, 72.5, 75, 80, 82.5, 85, 87.5, 90, 92.5, 95];

    let html = "<h3>Résultats</h3><ul>";
    percentages.forEach(p => {
        const value = rm * (p / 100);
        html += `<li>${p}% = ${value.toFixed(2)}</li>`;
    });
    html += "</ul>";

    output.innerHTML = html;
}
</script>

</body>
</html>
